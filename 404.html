<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | Brou Aerial Surveys</title>
  <meta name="robots" content="noindex" />
  <style>
    /* self-contained: a 404 can be served for any path, so no relative assets */
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #F7F4ED; color: #191C1F;
      font-family: "Hanken Grotesk", "Helvetica Neue", sans-serif; text-align: center; padding: 24px;
    }
    .wrap { max-width: 30rem; }
    .mark {
      width: 44px; height: 44px; border-radius: 12px; background: #16455A; margin: 0 auto 1.4rem; position: relative;
    }
    .mark::before, .mark::after { content: ""; position: absolute; background: #F3B838; border-radius: 2px; }
    .mark::before { left: 50%; top: 9px; bottom: 9px; width: 4px; transform: translateX(-50%); }
    .mark::after { top: 50%; left: 9px; right: 9px; height: 4px; transform: translateY(-50%); }
    h1 { font-family: Georgia, serif; font-weight: 500; font-size: 2rem; margin: 0 0 0.6rem; }
    p { color: #59606A; line-height: 1.6; margin: 0 0 1.6rem; }
    a.btn {
      display: inline-block; padding: 0.9rem 1.7rem; border-radius: 999px;
      background: #16455A; color: #fff; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true"></div>
    <h1>This page flew off course.</h1>
    <p>The page you were looking for doesn't exist. The whole survey record is one page anyway — everything is on the homepage.</p>
    <a class="btn" id="homeLink" href="/">Back to Brou Aerial Surveys</a>
  </div>
  <script>
    /* served from two hosts: GitHub Pages under /brou-aerial-surveys/, Netlify at root */
    if (location.hostname.endsWith("github.io")) {
      document.getElementById("homeLink").href = "/brou-aerial-surveys/";
    }
  </script>
</body>
</html>
